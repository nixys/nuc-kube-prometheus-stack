# -- Override the default chart label name if needed.
nameOverride: ""

# -- Extra labels applied to every rendered resource.
commonLabels: {}
# -- Extra annotations applied to every rendered resource.
commonAnnotations: {}

# The defaults below are aligned with the Prometheus Operator CRDs bundled by
# kube-prometheus-stack. Override them only if your cluster serves other versions.
apiVersions:
  # -- Default apiVersion for ServiceMonitor resources.
  serviceMonitor: monitoring.coreos.com/v1
  # -- Default apiVersion for ScrapeConfig resources.
  scrapeConfig: monitoring.coreos.com/v1alpha1
  # -- Default apiVersion for PrometheusRule resources.
  prometheusRule: monitoring.coreos.com/v1
  # -- Default apiVersion for Probe resources.
  probe: monitoring.coreos.com/v1
  # -- Default apiVersion for PodMonitor resources.
  podMonitor: monitoring.coreos.com/v1

# Each list item supports:
# - enabled: optional, set false for documentation-only placeholders or staged activation
# - name: required
# - namespace: optional, defaults to the release namespace
# - labels: optional
# - annotations: optional
# - apiVersion: optional override for a single resource
# - spec: arbitrary resource spec
# - status: optional raw status block for fixtures and synthetic manifests
#
# The disabled placeholder items below exist so helm-docs can describe nested
# fields for list entries without rendering resources by default.

# -- ServiceMonitor resources to render.
serviceMonitors:
  - # -- Set to false to keep a list item in values only for documentation or staged activation.
    enabled: false
    # -- Resource name.
    name: placeholder-service-monitor
    # -- Namespace for the resource. Defaults to the release namespace when omitted.
    namespace: monitoring
    # -- Resource-specific labels merged on top of commonLabels and chart labels.
    labels: {}
    # -- Resource-specific annotations merged on top of commonAnnotations.
    annotations: {}
    # -- Optional per-resource apiVersion override.
    apiVersion: monitoring.coreos.com/v1
    # -- Raw resource spec rendered as-is.
    spec: {}
    # -- Optional raw resource status rendered as-is.
    status: {}

