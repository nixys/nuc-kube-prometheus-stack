{{- range $index, $item := .Values.podMonitors }}
---
{{ include "nuc-kube-prometheus-stack.renderResource" (dict
  "root" $
  "item" $item
  "kind" "PodMonitor"
  "defaultApiVersion" $.Values.apiVersions.podMonitor
  "resourceKey" (printf "podMonitors[%d]" $index)
  "namespaced" true
) }}
{{- end }}
