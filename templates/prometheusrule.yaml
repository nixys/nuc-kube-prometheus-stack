{{- $items := .Values.prometheusRules | default dict }}
{{- range $key := keys $items | sortAlpha }}
{{- $item := index $items $key }}
{{- $enabled := true }}
{{- if hasKey $item "enabled" }}
{{- $enabled = $item.enabled }}
{{- end }}
{{- if $enabled }}
---
{{ include "nuc-kube-prometheus-stack.renderResource" (dict
  "root" $
  "item" $item
  "kind" "PrometheusRule"
  "defaultApiVersion" $.Values.apiVersions.prometheusRule
  "resourceKey" (printf "prometheusRules.%s" $key)
  "namespaced" true
) }}
{{- end }}
{{- end }}
