suite: rendering contract
templates:
  - templates/servicemonitor.yaml
  - templates/prometheusrule.yaml
release:
  name: unit-test
  namespace: unit-namespace

tests:
  - it: renders no ServiceMonitor documents by default
    template: templates/servicemonitor.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders no PrometheusRule documents by default
    template: templates/prometheusrule.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: applies helper defaults and overrides for namespaced resources
    values:
      - values/rendering_contract.values.yaml
    template: templates/servicemonitor.yaml
    documentSelector:
      path: metadata.name
      value: merged-service-monitor
    asserts:
      - isKind:
          of: ServiceMonitor
      - equal:
          path: apiVersion
          value: example.net/v1alpha1
      - equal:
          path: metadata.namespace
          value: unit-namespace
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: monitoring-platform
      - equal:
          path: metadata.labels.stack
          value: observability
      - equal:
          path: metadata.labels.component
          value: service-monitor
      - equal:
          path: metadata.labels.tier
          value: edge
      - equal:
          path: metadata.annotations.team
          value: platform
      - equal:
          path: metadata.annotations.note
          value: external
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: api

  - it: renders namespaced resources with configured apiVersion and explicit namespace
    values:
      - values/rendering_contract.values.yaml
    template: templates/prometheusrule.yaml
    documentSelector:
      path: metadata.name
      value: platform-rules
    asserts:
      - isKind:
          of: PrometheusRule
      - equal:
          path: apiVersion
          value: example.net/v1beta1
      - equal:
          path: metadata.namespace
          value: ops-rules
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: monitoring-platform
      - equal:
          path: metadata.labels.component
          value: rule
      - equal:
          path: metadata.annotations.team
          value: platform
      - equal:
          path: metadata.annotations.note
          value: alerts
      - equal:
          path: spec.groups[0].rules[0].record
          value: up:sum
